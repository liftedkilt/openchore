services:
  api:
    image: ghcr.io/liftedkilt/openchore/api:latest
    build:
      context: .
      dockerfile: Containerfile
    container_name: openchore-api
    restart: unless-stopped
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - openchore-data:/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/users"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: ghcr.io/liftedkilt/openchore/web:latest
    build:
      context: ./web
      dockerfile: Containerfile
    container_name: openchore-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  openchore-data:
