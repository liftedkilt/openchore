root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server/"
  bin = "./tmp/main"
  full_bin = "DB_PATH=openchore.db ./tmp/main"
  include_ext = ["go", "sql"]
  exclude_dir = ["tmp", "web", "node_modules", ".git"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true
