settings:
  admin_passcode: "1234"

# AI-powered features (requires LiteRT + Kokoro sidecars — see compose.yaml)
# Enable with: docker compose --profile ai up
# These settings are stored in the database and can be changed from the admin UI.
# Values here are only applied on first boot (like all config).
# For existing installs, configure via Admin > Settings > AI Photo Review.
ai:
  enabled: false
  endpoint: "http://litert:8080"     # LiteRT sidecar (or http://ollama:11434 for Ollama)
  model: "gemma4:e4b"              # Vision + text model
  auto_approve_threshold: 0.85
  tts_enabled: false
  tts_endpoint: "http://kokoro:8880"  # Kokoro-FastAPI (OpenAI-compatible TTS)
  tts_voice: "af_heart"               # Warm, kid-friendly voice

# Webhook subsystem tunables.
# These apply at server startup — changes require a restart.
webhooks:
  # How many days of webhook_deliveries (delivery attempt log) to keep before
  # a background goroutine purges older rows. The table grows with every
  # outbound webhook delivery, so unbounded retention wastes disk and slows
  # queries. Set to 0 to disable cleanup and retain forever. Default: 30.
  delivery_retention_days: 30
  # How often (in hours) the cleanup goroutine wakes up to purge old rows.
  # Default: 24 (once per day).
  delivery_cleanup_interval_hours: 24
