# OpenChore Configuration
# Copy this file to config.yaml and customize for your family.
# The config is applied only when the database is empty (first boot).
# To re-apply, use ./redeploy.sh --wipe to clear the database.

users:
  - name: Alex
    role: admin
  - name: Jamie
    role: admin
  - name: Emma
    role: child
    age: 11
    theme: default
  - name: Lily
    role: child
    age: 9
    theme: default
  - name: Noah
    role: child
    age: 7
    theme: default

chores:
  # === Required daily chores ===
  - title: "Feed Cats (Morning)"
    icon: "🐱"
    category: required
    points: 5
    missed_penalty: 5
    schedules:
      - assign_to: Emma
        days: [daily]
        available_at: "07:00"
        due_by: "09:00"
        expiry: no_points

  - title: "Feed Cats (Evening)"
    icon: "🐱"
    category: required
    points: 5
    missed_penalty: 5
    schedules:
      - assign_to: Emma
        days: [daily]
        available_at: "19:00"
        due_by: "21:00"
        expiry: no_points

  - title: "Make Bed"
    icon: "🛏️"
    category: required
    points: 5
    missed_penalty: 5
    schedules:
      - assign_to: Emma
        days: [daily]
        expiry: block
      - assign_to: Lily
        days: [daily]
        expiry: block
      - assign_to: Noah
        days: [daily]
        expiry: block

  - title: "Brush Teeth (Morning)"
    icon: "🪥"
    category: required
    points: 5
    missed_penalty: 5
    schedules:
      - assign_to: Emma
        days: [daily]
        available_at: "07:00"
        due_by: "09:00"
        expiry: no_points
      - assign_to: Lily
        days: [daily]
        available_at: "07:00"
        due_by: "09:00"
        expiry: no_points
      - assign_to: Noah
        days: [daily]
        available_at: "07:00"
        due_by: "09:00"
        expiry: no_points

  - title: "Brush Teeth (Evening)"
    icon: "🪥"
    category: required
    points: 5
    missed_penalty: 5
    schedules:
      - assign_to: Emma
        days: [daily]
        available_at: "20:00"
        due_by: "21:30"
        expiry: no_points
      - assign_to: Lily
        days: [daily]
        available_at: "20:00"
        due_by: "21:30"
        expiry: no_points
      - assign_to: Noah
        days: [daily]
        available_at: "20:00"
        due_by: "21:30"
        expiry: no_points

  # === Core rotating chores ===
  - title: "Empty Dishwasher"
    icon: "🍽️"
    category: core
    points: 10
    schedules:
      - assign_to: Emma
        days: [mon, wed, fri]
        expiry: block

  - title: "Load Dishwasher"
    icon: "🍽️"
    category: core
    points: 10
    schedules:
      - assign_to: Lily
        days: [tue, thu, sat]
        available_at: "18:00"
        expiry: block

  - title: "Sweep Kitchen"
    icon: "🧹"
    category: core
    points: 10
    schedules:
      - assign_to: Lily
        days: [mon, fri]
        expiry: block

  - title: "Clean Room"
    icon: "🧹"
    category: core
    points: 15
    schedules:
      - assign_to: Emma
        days: [sat]
        expiry: block
      - assign_to: Lily
        days: [sat]
        expiry: block

  - title: "Take Out Trash"
    icon: "🗑️"
    category: core
    points: 10
    schedules:
      - assign_to: Noah
        days: [wed, sat]
        expiry: block

  - title: "Fold Laundry"
    icon: "👕"
    category: core
    points: 10
