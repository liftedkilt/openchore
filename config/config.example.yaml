  - title: "Pick Up Toys"
    icon: "🧸"
    category: core
    points: 5
    schedules:
      - assign_to: Noah
        days: [daily]
        expiry: block

  - title: "Wipe Bathroom Counter"
    icon: "🧽"
    category: core
    points: 10
    schedules:
      - assign_to: Emma
        days: [thu]
        expiry: block

  # === Bonus chores ===
  - title: "Read 20 Minutes"
    icon: "📖"
